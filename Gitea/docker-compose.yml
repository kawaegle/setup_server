version: "3"

networks:
  ssl-git:
    external: true
  gitea:
    external: false

volumes:
  db:
  git_data:

services:
  server:
    image: gitea/gitea:1.20
    container_name: gitea
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: ${DB_TYPE}
      GITEA__database__HOST: gitea_db:3306
      GITEA__database__NAME: ${SQL_DB}
      GITEA__database__USER: ${SQL_USER}
      GITEA__database__PASSWD: ${SQL_PASSWORD}
      GITEA__service__DISABLE_REGISTRATION: ${DISABLE_REGISTRATION}
      GITEA_APP_NAME: ${APP_NAME}
      VIRTUAL_HOST: git.oppaiweeb.tech
      LETSENCRYPT_HOST: git.oppaiweeb.tech
      VIRTUAL_PORT: 3000
    restart: always
    networks:
      - ssl-git
      - gitea
    volumes:
      - git_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2222:22"
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    container_name: gitea_db
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
    networks:
      - gitea
    volumes:
      - db:/var/lib/mysql
